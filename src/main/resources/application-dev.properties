spring.application.name=ms-messaging
# ================================
#     Base de datos PostgreSQL
# ================================
#spring.datasource.url=jdbc:postgresql://localhost:5432/ms-messaging-IusCloud
spring.datasource.url=jdbc:postgresql://postgres:5432/ms-messaging-IusCloud
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
##spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.cache.use_second_level_cache=false



# Opcional (debug SQL)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
server.port=8084
server.servlet.context-path=/ms-messaging/

# ================================
#      SPRING SECURITY
# ================================
spring.security.user.name=admin
spring.security.user.password=1234
spring.security.user.roles=ADMINISTRADOR
security.jwt.secret=zxfQiQ/OOKEMgvaetUUVY6aejYur6X5OSonLrKEwBWempbBEFoN/aruX5o4JY7eQy6TTY/9PLlRKdBlx2RgWoA==
security.jwt.expiration=86400000

# ================================
#      Configuracion Flyway
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================
#      Redis
# ================================
spring.data.redis.host=redis
spring.data.redis.port=6379

# ================================
#      Servicios externos
# ================================
auth.service.url=http://auth:8081/ms-auth

# ================================
#      Evolution API (WhatsApp)
# ================================
evolution.api.url=${EVOLUTION_API_URL:http://iuscloud-evolution-api:8080}
evolution.api.key=${EVOLUTION_API_KEY:admin}
