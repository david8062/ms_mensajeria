spring.application.name=ms-messaging

# ================================
#     Base de datos PostgreSQL
# ================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

server.port=8084
server.servlet.context-path=/ms-messaging/

# ================================
#      SPRING SECURITY / JWT
# ================================
security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:86400000}

# ================================
#      Redis
# ================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:iuscloud-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# ================================
#      Configuracion Flyway
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================
#      Actuator
# ================================
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# ================================
#      Servicios externos
# ================================
auth.service.url=${AUTH_SERVICE_URL:http://iuscloud-auth:8081/ms-auth}

# ================================
#      Evolution API (WhatsApp)
# ================================
evolution.api.url=${EVOLUTION_API_URL:http://iuscloud-evolution-api:8080}
evolution.api.key=${EVOLUTION_API_KEY}

# ================================
#      Clave interna inter-servicios
# ================================
internal.api.key=${INTERNAL_API_KEY}

# ================================
#      Logging
# ================================
logging.level.root=INFO
logging.level.com.IusCloud=INFO

# Linea de WhatsApp propia de IusCloud: envia los OTP a PROSPECTOS (aun no son tenants,
# asi que no tienen instancia propia desde la cual enviar).
messaging.platform.instance-name=${MESSAGING_PLATFORM_INSTANCE:IusCloud}
